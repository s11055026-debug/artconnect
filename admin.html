<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtConnect 後台管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #A38A75; --secondary-color: #E6DFD3; --dark-color: #2C2C2C; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF7; padding-top: 40px; }
        h2 { font-family: 'Noto Serif TC', serif; font-weight: 700; }
        .table-custom-card { background: white; border: 1px solid rgba(163, 138, 117, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.02); overflow: hidden; }
        .table thead { background-color: var(--secondary-color); }
        .table th { padding: 15px; border: none; }
        .table td { padding: 18px 15px; vertical-align: middle; }
        .badge-student { background-color: #D1E4E6; color: #2E5A60; border-radius:0; padding: 6px 12px; }
        .badge-creator { background-color: #EADCD6; color: #764A37; border-radius:0; padding: 6px 12px; }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>⚙️ ArtConnect 後台管理系統</h2>
            <a href="index.html" class="btn btn-outline-dark rounded-0">返回會員前台首頁</a>
        </div>
        <p class="text-muted small" style="margin-top: -20px;">管理端安全憑證：核心資料表即時監控、使用者權限核准與帳號異動管理</p>
        
        <div class="table-custom-card mt-5">
            <div class="p-3 bg-dark text-white fw-bold small d-flex justify-content-between align-items-center">
                <span>📊 LIVE SCHEMA MONITOR: `artconnect.members` 資料表</span>
                <span class="badge bg-success text-white px-2 py-1" style="font-size: 0.75rem;">MySQL 8.0 連線正常</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>member_id</th>
                            <th>姓名 (name)</th>
                            <th>帳號信箱 (email)</th>
                            <th>系統角色 (role)</th>
                            <th>資料庫異動</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="fw-bold text-muted">1</td>
                            <td><strong>陳大文</strong></td>
                            <td class="text-muted">student1@gm2.ccu.edu.tw</td>
                            <td><span class="badge badge-student">student</span></td>
                            <td><button class="btn btn-link text-danger text-decoration-none small p-0" onclick="alert('已成功下達 SQL 指令：\nDELETE FROM members WHERE member_id = 1;')">強制解約</button></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">2</td>
                            <td><strong>林藝術</strong></td>
                            <td class="text-muted">creator1@gm2.ccu.edu.tw</td>
                            <td><span class="badge badge-creator">creator</span></td>
                            <td><button class="btn btn-link text-danger text-decoration-none small p-0" onclick="alert('已成功下達 SQL 指令：\nDELETE FROM members WHERE member_id = 2;')">強制解約</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
